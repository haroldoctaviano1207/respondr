      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__ApplyMigrations: "false"
      ConnectionStrings__RespondrDb: Server=sqlserver,1433;Database=RespondrDb;User Id=sa;Password=${RESPONDR_SQL_SA_PASSWORD:-Respondr_dev_12345!};TrustServerCertificate=True;Encrypt=False
      Jwt__Issuer: ${RESPONDR_JWT_ISSUER:-respondr.local}
      Jwt__Audience: ${RESPONDR_JWT_AUDIENCE:-respondr.clients}
      Jwt__Key: ${RESPONDR_JWT_KEY:-Respondr_Local_Development_Key_1234567890}
    ports:
      - "8083:8080"

  resources-api:
    build:
      context: .
      dockerfile: backend/src/Hosts/Respondr.Resources.Api/Dockerfile
    container_name: respondr-resources-api
